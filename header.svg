<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="200" style="background: radial-gradient(circle at center, #1e1e2e 0%, #11111b 100%); border-radius: 12px; font-family: 'Outfit', 'Inter', system-ui, -apple-system, sans-serif;">
  <style>
    @keyframes pulse {
      0% { r: 4px; opacity: 0.3; }
      50% { r: 7px; opacity: 0.9; }
      100% { r: 4px; opacity: 0.3; }
    }
    @keyframes pulse-ring {
      0% { r: 8px; opacity: 0.8; stroke-width: 1.5px; }
      100% { r: 28px; opacity: 0; stroke-width: 0.5px; }
    }
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-5px); }
      100% { transform: translateY(0px); }
    }
    .node {
      animation: pulse 3s infinite ease-in-out;
      fill: #89b4fa;
    }
    .node-2 {
      animation: pulse 4s infinite ease-in-out;
      animation-delay: 1.2s;
      fill: #f5c2e7;
    }
    .ring {
      animation: pulse-ring 3s infinite cubic-bezier(0.215, 0.610, 0.355, 1);
      fill: none;
      stroke: #89b4fa;
    }
    .ring-2 {
      animation: pulse-ring 4s infinite cubic-bezier(0.215, 0.610, 0.355, 1);
      animation-delay: 1.8s;
      fill: none;
      stroke: #f5c2e7;
    }
    .network {
      transform-origin: 120px 100px;
      animation: float 6s infinite ease-in-out;
    }
    .glow-text {
      font-weight: 800;
      font-size: 38px;
      fill: url(#text-grad);
      filter: drop-shadow(0px 2px 10px rgba(245, 194, 231, 0.4));
    }
    .subtitle {
      font-size: 15px;
      font-weight: 600;
      fill: #a6adc8;
      letter-spacing: 3px;
    }
    .sparkle {
      animation: pulse 2.5s infinite ease-in-out;
    }
  </style>

  <defs>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%">
        <animate attributeName="stop-color" values="#89b4fa; #f5c2e7; #cdd6f4; #89b4fa" dur="6s" repeatCount="indefinite" />
      </stop>
      <stop offset="50%">
        <animate attributeName="stop-color" values="#f5c2e7; #cdd6f4; #89b4fa; #f5c2e7" dur="6s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%">
        <animate attributeName="stop-color" values="#cdd6f4; #89b4fa; #f5c2e7; #cdd6f4" dur="6s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Animated Neural Network -->
  <g class="network">
    <!-- Connecting network lines -->
    <line x1="60" y1="100" x2="120" y2="50" stroke="#313244" stroke-width="1.5" stroke-dasharray="2,2" />
    <line x1="120" y1="50" x2="180" y2="100" stroke="#45475a" stroke-width="1.5" />
    <line x1="180" y1="100" x2="120" y2="150" stroke="#313244" stroke-width="1.5" stroke-dasharray="2,2" />
    <line x1="120" y1="150" x2="60" y2="100" stroke="#45475a" stroke-width="1.5" />
    <line x1="120" y1="50" x2="120" y2="150" stroke="#313244" stroke-width="1" />
    <line x1="60" y1="100" x2="180" y2="100" stroke="#313244" stroke-width="1" />

    <line x1="120" y1="50" x2="100" y2="100" stroke="#45475a" stroke-width="1.2" />
    <line x1="120" y1="150" x2="140" y2="100" stroke="#45475a" stroke-width="1.2" />
    <line x1="60" y1="100" x2="100" y2="100" stroke="#45475a" stroke-width="1.2" />
    <line x1="180" y1="100" x2="140" y2="100" stroke="#45475a" stroke-width="1.2" />
    <line x1="100" y1="100" x2="120" y2="100" stroke="#89b4fa" stroke-width="1.5" opacity="0.6" />
    <line x1="120" y1="100" x2="140" y2="100" stroke="#f5c2e7" stroke-width="1.5" opacity="0.6" />

    <!-- Pulsing Rings (Background Waves) -->
    <circle cx="120" cy="100" r="8" class="ring" />
    <circle cx="120" cy="100" r="8" class="ring-2" />

    <!-- Inner pulsing nodes -->
    <circle cx="60" cy="100" r="5" class="node" />
    <circle cx="120" cy="50" r="6" class="node-2" />
    <circle cx="180" cy="100" r="5" class="node" />
    <circle cx="120" cy="150" r="6" class="node-2" />
    <circle cx="100" cy="100" r="4" class="node" style="animation-delay: 0.6s;" />
    <circle cx="140" cy="100" r="4" class="node-2" style="animation-delay: 0.9s;" />

    <!-- Glowing Brain Hub -->
    <circle cx="120" cy="100" r="8" fill="#cdd6f4" filter="url(#glow)" />
    <circle cx="120" cy="100" r="4" fill="#11111b" />
  </g>

  <!-- Shimmering Name Tag -->
  <g transform="translate(240, 92)">
    <text class="glow-text">Muskan Sethi</text>
    <text y="38" class="subtitle">ARTIFICIAL INTELLIGENCE ENGINEER</text>
  </g>

  <!-- Dynamic Sparkles -->
  <g class="sparkle">
    <circle cx="230" cy="50" r="2" fill="#f5c2e7" style="animation-delay: 0.2s;" />
    <circle cx="700" cy="155" r="1.5" fill="#89b4fa" style="animation-delay: 0.5s;" />
    <circle cx="740" cy="65" r="2" fill="#cdd6f4" style="animation-delay: 0.8s;" />
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="200" style="background: radial-gradient(circle at center, #0f111a 0%, #08090f 100%); border-radius: 12px; font-family: 'Outfit', 'Inter', system-ui, sans-serif;">
  <style>
    @keyframes pulse {
      0% { r: 4px; opacity: 0.4; }
      50% { r: 7.5px; opacity: 0.9; }
      100% { r: 4px; opacity: 0.4; }
    }
    @keyframes pulse-ring {
      0% { r: 8px; opacity: 0.8; stroke-width: 1.5px; }
      100% { r: 32px; opacity: 0; stroke-width: 0.5px; }
    }
    @keyframes flow {
      to {
        stroke-dashoffset: -20;
      }
    }
    @keyframes float-slow {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
      100% { transform: translateY(0px); }
    }
    @keyframes float-medium {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-9px); }
      100% { transform: translateY(0px); }
    }
    @keyframes float-fast {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-4px); }
      100% { transform: translateY(0px); }
    }
    @keyframes border-glow {
      0% { stroke: #89b4fa; }
      50% { stroke: #f5c2e7; }
      100% { stroke: #89b4fa; }
    }
    .node {
      animation: pulse 3s infinite ease-in-out;
      fill: #89b4fa;
    }
    .node-2 {
      animation: pulse 4s infinite ease-in-out;
      animation-delay: 1.5s;
      fill: #f5c2e7;
    }
    .ring {
      animation: pulse-ring 3s infinite cubic-bezier(0.215, 0.610, 0.355, 1);
      fill: none;
      stroke: #89b4fa;
    }
    .ring-2 {
      animation: pulse-ring 4s infinite cubic-bezier(0.215, 0.610, 0.355, 1);
      animation-delay: 2s;
      fill: none;
      stroke: #f5c2e7;
    }
    .network {
      transform-origin: 100px 100px;
      animation: float-slow 7s infinite ease-in-out;
    }
    .flow-line {
      stroke: #89b4fa;
      stroke-width: 1.5;
      stroke-dasharray: 6, 4;
      animation: flow 1.2s linear infinite;
    }
    .flow-line-reverse {
      stroke: #f5c2e7;
      stroke-width: 1.5;
      stroke-dasharray: 6, 4;
      animation: flow 1.2s linear infinite reverse;
    }
    .glow-text {
      font-weight: 800;
      font-size: 38px;
      fill: url(#text-grad);
      filter: drop-shadow(0px 2px 10px rgba(245, 194, 231, 0.5));
    }
    .subtitle {
      font-size: 14px;
      font-weight: 700;
      fill: #a6adc8;
      letter-spacing: 4px;
    }
    .tech-pill {
      font-size: 11px;
      font-weight: bold;
      fill: #cdd6f4;
    }
    .floating-pill-1 {
      transform-origin: 660px 50px;
      animation: float-medium 5s infinite ease-in-out;
    }
    .floating-pill-2 {
      transform-origin: 720px 110px;
      animation: float-slow 8s infinite ease-in-out;
    }
    .floating-pill-3 {
      transform-origin: 640px 150px;
      animation: float-fast 6s infinite ease-in-out;
    }
    .border-card {
      animation: border-glow 8s infinite ease-in-out;
      stroke-width: 1.5;
      fill: none;
      rx: 12px;
    }
  </style>

  <defs>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%">
        <animate attributeName="stop-color" values="#89b4fa; #f5c2e7; #cdd6f4; #89b4fa" dur="5s" repeatCount="indefinite" />
      </stop>
      <stop offset="50%">
        <animate attributeName="stop-color" values="#f5c2e7; #cdd6f4; #89b4fa; #f5c2e7" dur="5s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%">
        <animate attributeName="stop-color" values="#cdd6f4; #89b4fa; #f5c2e7; #cdd6f4" dur="5s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Glowing Animated Card Border -->
  <rect x="1" y="1" width="798" height="198" class="border-card" />

  <!-- Animated Neural Network (Left Side) -->
  <g class="network">
    <!-- Active Flowing Data Paths -->
    <line x1="50" y1="100" x2="110" y2="40" class="flow-line" />
    <line x1="110" y1="40" x2="170" y2="100" stroke="#313244" stroke-width="1.5" />
    <line x1="170" y1="100" x2="110" y2="160" class="flow-line-reverse" />
    <line x1="110" y1="160" x2="50" y2="100" stroke="#313244" stroke-width="1.5" />
    
    <line x1="110" y1="40" x2="110" y2="160" stroke="#181825" stroke-width="1" />
    <line x1="50" y1="100" x2="170" y2="100" stroke="#181825" stroke-width="1" />

    <line x1="110" y1="40" x2="90" y2="100" class="flow-line-reverse" />
    <line x1="110" y1="160" x2="130" y2="100" class="flow-line" />
    <line x1="50" y1="100" x2="90" y2="100" stroke="#45475a" stroke-width="1.2" />
    <line x1="170" y1="100" x2="130" y2="100" stroke="#45475a" stroke-width="1.2" />

    <!-- Pulsing Rings (Waves) -->
    <circle cx="110" cy="100" r="8" class="ring" />
    <circle cx="110" cy="100" r="8" class="ring-2" />

    <!-- Outer Nodes -->
    <circle cx="50" cy="100" r="5.5" class="node" />
    <circle cx="110" cy="40" r="6" class="node-2" />
    <circle cx="170" cy="100" r="5.5" class="node" />
    <circle cx="110" cy="160" r="6" class="node-2" />
    <circle cx="90" cy="100" r="4.5" class="node" style="animation-delay: 0.5s;" />
    <circle cx="130" cy="100" r="4.5" class="node-2" style="animation-delay: 0.8s;" />

    <!-- Brain Hub -->
    <circle cx="110" cy="100" r="9" fill="#cdd6f4" filter="url(#glow)" />
    <circle cx="110" cy="100" r="4.5" fill="#0f111a" />
  </g>

  <!-- Name & Title (Center) -->
  <g transform="translate(230, 92)">
    <text class="glow-text">Muskan Sethi</text>
    <text y="38" class="subtitle">ARTIFICIAL INTELLIGENCE ENGINEER</text>
  </g>

  <!-- Floating Tech Stack Nodes (Right Side) -->
  <!-- PyTorch Floating Pill -->
  <g class="floating-pill-1">
    <rect x="640" y="35" width="80" height="26" rx="13" fill="#313244" stroke="#ff6f00" stroke-width="1" opacity="0.8" />
    <circle cx="653" cy="48" r="4" fill="#ff6f00" />
    <text x="664" y="52" class="tech-pill">PyTorch</text>
  </g>

  <!-- LangChain Floating Pill -->
  <g class="floating-pill-2">
    <rect x="660" y="85" width="95" height="26" rx="13" fill="#313244" stroke="#1c3c3a" stroke-width="1" opacity="0.8" />
    <circle cx="673" cy="98" r="4" fill="#008080" />
    <text x="684" y="102" class="tech-pill">LangChain</text>
  </g>

  <!-- OpenCV Floating Pill -->
  <g class="floating-pill-3">
    <rect x="620" y="135" width="80" height="26" rx="13" fill="#313244" stroke="#5c3ee8" stroke-width="1" opacity="0.8" />
    <circle cx="633" cy="148" r="4" fill="#5c3ee8" />
    <text x="644" y="152" class="tech-pill">OpenCV</text>
  </g>
</svg>
